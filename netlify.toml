[build]
  command = "cd .. && npm install && npm run build:packages && cd circles-app && npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "22.20.0"

[context.deploy-preview]
  command = "cd .. && npm install && npm run build:packages && cd circles-app && npm run build"

  [context.deploy-preview.environment]
    NETLIFY_BUILD = "true"
    PUBLIC_ENVIRONMENT = "staging"
    PUBLIC_CIRCLES_RPC_URL = "https://staging.circlesubi.network"
    PUBLIC_PLAUSIBLE_DOMAIN = ""

[context.branch-deploy]
  command = "cd .. && npm install && npm run build:packages && cd circles-app && npm run build"

  [context.branch-deploy.environment]
    NETLIFY_BUILD = "true"
    PUBLIC_ENVIRONMENT = "staging"
    PUBLIC_CIRCLES_RPC_URL = "https://staging.circlesubi.network"
    PUBLIC_PLAUSIBLE_DOMAIN = ""

[context.production]
  command = "cd .. && npm install && npm run build:packages && cd circles-app && npm run build"

  [context.production.environment]
    NETLIFY_BUILD = "true"
    PUBLIC_ENVIRONMENT = "production"
    PUBLIC_CIRCLES_RPC_URL = "https://rpc.aboutcircles.com"
    PUBLIC_PLAUSIBLE_DOMAIN = "app.aboutcircles.com"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/build/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
